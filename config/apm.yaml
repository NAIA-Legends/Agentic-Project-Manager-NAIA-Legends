# AgenticProjectManager configuration — tailored to NAIA Legends
# (NFL Street–inspired 7v7 arcade football game, Unreal Engine 5.8).
# Source spec: ../SPEC.md · retailor with /tailor if the spec changes materially.

tailored: true

project:
  name: "NAIA Legends"
  root: ".."
  spec: "SPEC.md"
  active_version_spec: "SPECS/SPEC_V0.md"
  workspace: "UnrealProject/"
  conventions: "UnrealProject/CLAUDE.md"

runner:
  engine: cli                   # cli (wraps `claude -p`) | sdk (claude-agent-sdk)
  pm_model: null                # session default
  consult_model: null           # set e.g. claude-sonnet-5 to cheapen consults
  max_turns: 150
  consult_max_turns: 40
  max_budget_usd: 10

ledger:
  backend: supabase
  jsonfile_path: ".apm/ledger.json"

pm:
  tool_surface: mcp             # GitHub + Supabase via MCP — portable off this machine
  mcp_config: mcp/pm.mcp.json
  mcp_tools:
    - mcp__github
    - mcp__supabase

consult:
  mcp_config: mcp/consult.mcp.json  # unreal (editor inspection) + github (QA bugs)

# Read-only Unreal editor inspection (SPEC.md §3.10): discovery/introspection
# tools only. QA additionally runs automation/perf via call_tool +
# execute_python_code — charter-bound to modify nothing (§3.6). Editor server
# is only reachable where an editor runs; elsewhere consults degrade to
# code+docs+web (server marked failed, session continues).
x-unreal-inspect: &unreal_inspect
  - "mcp__unreal__discover_python_class"
  - "mcp__unreal__discover_python_module"
  - "mcp__unreal__discover_python_function"
  - "mcp__unreal__list_python_subsystems"
  - "mcp__unreal__list_toolsets"
  - "mcp__unreal__describe_toolset"

roles:
  - name: gd
    title: "Game Designer / Feel Owner — feel targets, tuning values, playbook, catch rules"
    extra_tools: *unreal_inspect
  - name: ge
    title: "Gameplay Engineer — pawns, ball flight, input, camera, match FSM, pipeline; triage generalist"
    extra_tools: *unreal_inspect
  - name: aie
    title: "AI Engineer — per-pawn FSMs: pursuit, routes, coverage, rush (v2–v7)"
    extra_tools: *unreal_inspect
  - name: ta
    title: "Tech Artist / Animation — asset pipeline, retargeting, materials, VFX/UI; budget guardrails"
    extra_tools: *unreal_inspect
  - name: qa
    title: "QA / Playtest Coordinator — regression, automation, perf, exit-criterion protocol"
    extra_tools:
      - "mcp__unreal__discover_python_class"
      - "mcp__unreal__discover_python_module"
      - "mcp__unreal__discover_python_function"
      - "mcp__unreal__list_python_subsystems"
      - "mcp__unreal__list_toolsets"
      - "mcp__unreal__describe_toolset"
      - "mcp__unreal__call_tool"
      - "mcp__unreal__execute_python_code"
      - "mcp__github__issue_read"
      - "mcp__github__issue_write"
      - "mcp__github__search_issues"

# Mirror of SPEC.md §3.12 — one taxonomy for routing, dedup fingerprints, ledger
routing:
  - prefixes: [movement]
    primary: ge
    co: [gd]
    note: "locomotion, turbo, camera, input; gd for feel"
  - prefixes: [passing, catching, ball]
    primary: ge
    co: [gd]
    note: "gd for feel targets"
  - prefixes: [tackling, collision]
    primary: ge
    co: [ta, aie]
    note: "ta animations, aie pursuit"
  - prefixes: [ai]
    primary: aie
    co: [ge]
    note: "pursuit, coverage, routes, rush; ge integration"
  - prefixes: [feel, tuning, playbook]
    primary: gd
    co: [ge]
    note: "ge implementation notes"
  - prefixes: [assets, animation, vfx, ui, audio]
    primary: ta
    co: [ge]
  - prefixes: [perf, tests, build, repro]
    primary: qa
    co: [ge]
  - prefixes: [pipeline]
    primary: ge
    co: [qa]
    note: "repo, MCP stack, CI"

labels:
  ver: [v0, v1, v2, v3, v4, v5, v6, v7, v8, v9]
  type: [feature, bug, tuning, decision, deferred]

milestones:
  active: "v0 — The Field"
